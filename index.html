<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Under Maintenance</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      color: #ccc;
    }

    .small {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Site Under Maintenance</h1>
    <p>
      This website is currently being updated. Please check back soon.
    </p>
    <p class="small">
      Carson Engineers
    </p>
  </div>
</body>
</html>
